<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text x='16' y='24' font-size='25' text-anchor='middle' fill='black'>🏛️</text></svg>">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E675FYQ3DK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E675FYQ3DK');
    </script>
    <title>丗界史全征服</title>
    <style>
        :root {
            --split-pos: 30vh;
        }
        @media (orientation: portrait){
            :root {
                --split-pos: 15vh;
            }
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: serif;
        }

        #scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            position: relative;
            z-index: 1;
        }

        .content-wrapper {
            width: 100%;
            padding: 100px 3% 200px 3%;
        }

        .content {
            width: 94%;
            margin: 0 auto;
            font-size: calc(100dvw / 70);
            line-height: 2em;
            text-align: left;
        }

        #main-content {
            background-color: #fff;
            color: #000;
        }

        #mirror-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--split-pos);
            overflow: hidden;
            z-index: 10;
            pointer-events: none;
            background-color: #fff;
        }

        #mirror-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            will-change: transform;
        }

        .a { color: #f00; font-weight: bold; }
        .b { color: #fff; }

        table { border: 2px solid #555; border-collapse: collapse; }
        td, th { border: 1px solid #555; padding: 5px; }

        h1 {
            text-align: center;
            margin: 0 0 60px 0;
            font-size: 2.5em;
            font-family: serif;
        }

        .divider {
            position: fixed;
            top: var(--split-pos);
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #999;
            z-index: 15;
            border: none;
            margin: 0;
        }

        @media (orientation: portrait){
            .content-wrapper { padding-top: 200px; }
            .content { font-size: calc(100dvw / 35); }
        }
    </style>
</head>
<body>

    <div id="scroll-container">
        <div id="main-content" class="content-wrapper">
            <div class="content">
                <h1>丗界史全征服</h1>
                <div id="text-bottom"></div>
            </div>
        </div>
    </div>

    <div id="mirror-view">
        <div id="mirror-content">
            <div class="content-wrapper">
                <div class="content">
                    <h1>丗界史全征服</h1>
                    <div id="text-top"></div>
                </div>
            </div>
        </div>
    </div>

    <hr class="divider" noshade>

    <script src="b.js"></script>
    <script>
        const scrollContainer = document.getElementById('scroll-container');
        const mirrorContent = document.getElementById('mirror-content');
        
        document.getElementById('text-top').innerHTML = b.replace(/class="b"/g, 'class="a"');
        document.getElementById('text-bottom').innerHTML = b;

        scrollContainer.addEventListener('scroll', () => {
            const scrollTop = scrollContainer.scrollTop;
            mirrorContent.style.transform = `translateY(${-scrollTop}px)`;
        }, { passive: true });
    </script>
</body>
</html>
